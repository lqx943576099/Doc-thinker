{% extends "base.html" %}
{% block content %}
    <!-- Page Title -->
    <div class="mb-5">
        <h1>
            <i class="fa fa-history"></i> 版本控制
        </h1>
        <p class="text-muted">管理知识图谱快照，包括创建、查看和恢复功能</p>
    </div>

    <!-- Action Buttons -->
    <div class="card mb-4">
        <div class="card-body">
            <div class="d-flex justify-content-between align-items-center">
                <div class="d-flex gap-2">
                    <button id="create-snapshot-btn" class="btn btn-primary">
                        <i class="fa fa-plus"></i> 创建新快照
                    </button>
                    <button id="refresh-snapshots-btn" class="btn btn-outline-primary">
                        <i class="fa fa-refresh"></i> 刷新
                    </button>
                    <button id="export-snapshots-btn" class="btn btn-outline-primary">
                        <i class="fa fa-download"></i> 导出快照
                    </button>
                </div>
                
                <!-- Search -->
                <div class="input-group" style="width: 300px;">
                    <input 
                        type="text" 
                        id="snapshot-search" 
                        class="form-control"
                        placeholder="搜索快照..."
                    >
                    <button 
                        id="search-btn" 
                        class="btn btn-primary"
                    >
                        <i class="fa fa-search"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Snapshots List -->
    <div class="card">
        <div class="card-header">
            <h3 class="mb-0">
                <i class="fa fa-list"></i> 知识图谱快照
                <span id="snapshot-count" class="badge bg-primary float-end">0</span>
            </h3>
        </div>
        <div class="card-body p-0">
            <!-- Loading State -->
            <div id="loading-snapshots" class="text-center py-5">
                <div class="spinner-border text-primary" style="width: 3rem; height: 3rem;" role="status">
                    <span class="visually-hidden">加载中...</span>
                </div>
                <h5 class="mt-3">正在加载快照</h5>
                <p class="text-muted">请稍候，我们正在加载快照...</p>
            </div>

            <!-- Snapshots Table -->
            <div id="snapshots-container" class="d-none">
                <table id="snapshots-table" class="table table-hover mb-0">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>描述</th>
                            <th>用户</th>
                            <th>日期</th>
                            <th>实体数</th>
                            <th>关系数</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="snapshots-list"></tbody>
                </table>
            </div>

            <!-- No Snapshots State -->
            <div id="no-snapshots" class="d-none text-center py-5">
                <i class="fa fa-search fa-5x text-muted mb-3"></i>
                <h4>未找到快照</h4>
                <p class="text-muted">尝试调整搜索条件或创建新快照</p>
                <button id="create-first-snapshot-btn" class="btn btn-primary mt-2">
                    <i class="fa fa-plus"></i> 创建第一个快照
                </button>
            </div>

            <!-- Pagination -->
            <div id="pagination" class="d-none d-flex justify-content-between align-items-center p-3 border-top">
                <div>
                    显示 <span id="showing-start">0</span> 到 <span id="showing-end">0</span> 条，共 <span id="total-snapshots">0</span> 条快照
                </div>
                <nav aria-label="Snapshot pagination">
                    <ul class="pagination mb-0">
                        <li class="page-item disabled">
                            <a class="page-link" href="#" tabindex="-1" aria-disabled="true">
                                <i class="fa fa-chevron-left"></i> 上一页
                            </a>
                        </li>
                        <li class="page-item active"><a class="page-link" href="#">1</a></li>
                        <li class="page-item">
                            <a class="page-link" href="#">下一页 <i class="fa fa-chevron-right"></i></a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>

    <!-- Create Snapshot Modal -->
    <div class="modal fade" id="create-snapshot-modal" tabindex="-1" aria-labelledby="create-snapshot-modal-label" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="create-snapshot-modal-label">
                        <i class="fa fa-plus"></i> 创建新快照
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="关闭"></button>
                </div>
                <form id="create-snapshot-form">
                    <div class="modal-body">
                        <div class="mb-3">
                            <label for="snapshot-description" class="form-label">描述</label>
                            <textarea 
                                id="snapshot-description" 
                                name="snapshot-description" 
                                class="form-control"
                                rows="3"
                                placeholder="输入快照描述（可选）"
                            ></textarea>
                        </div>
                        
                        <div class="mb-3">
                            <label for="snapshot-tags" class="form-label">标签</label>
                            <input 
                                type="text" 
                                id="snapshot-tags" 
                                name="snapshot-tags" 
                                class="form-control"
                                placeholder="输入标签，用逗号分隔（可选）"
                            >
                        </div>
                        
                        <div class="form-check">
                            <input 
                                class="form-check-input" 
                                type="checkbox" 
                                id="include-metadata"
                                name="include-metadata"
                                checked
                            >
                            <label class="form-check-label" for="include-metadata">
                                包含知识图谱元数据
                            </label>
                        </div>
                    </div>
                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                            <i class="fa fa-times"></i> 取消
                        </button>
                        <button type="submit" class="btn btn-primary">
                            <i class="fa fa-save"></i> 创建快照
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- View Snapshot Modal -->
    <div class="modal fade" id="view-snapshot-modal" tabindex="-1" aria-labelledby="view-snapshot-modal-label" aria-hidden="true">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="view-snapshot-modal-label">
                        <i class="fa fa-eye"></i> 查看快照详情
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="关闭"></button>
                </div>
                <div class="modal-body">
                    <div id="snapshot-details">
                        <!-- Snapshot details will be populated by JavaScript -->
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">
                        <i class="fa fa-times"></i> 关闭
                    </button>
                    <button id="restore-snapshot-btn" class="btn btn-primary">
                        <i class="fa fa-undo"></i> 恢复此快照
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Global variables
        let currentSnapshots = [];
        let filteredSnapshots = [];
        let currentPage = 1;
        const itemsPerPage = 10;
        const createSnapshotModal = new bootstrap.Modal(document.getElementById('create-snapshot-modal'));
        const viewSnapshotModal = new bootstrap.Modal(document.getElementById('view-snapshot-modal'));
        let selectedSnapshot = null;

        // Format timestamp to readable date
        function formatDate(timestamp) {
            const date = new Date(timestamp * 1000);
            return date.toLocaleString();
        }

        // Render snapshot list
        function renderSnapshots() {
            const snapshotList = document.getElementById('snapshots-list');
            const snapshotsContainer = document.getElementById('snapshots-container');
            const loadingContainer = document.getElementById('loading-snapshots');
            const noSnapshotsContainer = document.getElementById('no-snapshots');
            const paginationContainer = document.getElementById('pagination');
            const snapshotCount = document.getElementById('snapshot-count');
            const showingStart = document.getElementById('showing-start');
            const showingEnd = document.getElementById('showing-end');
            const totalSnapshots = document.getElementById('total-snapshots');

            // Show loading state
            loadingContainer.classList.remove('d-none');
            snapshotsContainer.classList.add('d-none');
            noSnapshotsContainer.classList.add('d-none');
            paginationContainer.classList.add('d-none');

            // Simulate API call delay
            setTimeout(async () => {
                try {
                    // Fetch snapshots from API
                    const snapshotsData = await fetchData('{{ api_config.api_prefix }}/version-control/snapshots');
                    currentSnapshots = snapshotsData.snapshots;
                    
                    // Filter snapshots based on search
                    const searchTerm = document.getElementById('snapshot-search').value.toLowerCase();
                    filteredSnapshots = currentSnapshots.filter(snapshot => {
                        return !searchTerm || 
                            snapshot.id.toLowerCase().includes(searchTerm) ||
                            snapshot.description.toLowerCase().includes(searchTerm) ||
                            snapshot.user.toLowerCase().includes(searchTerm);
                    });

                    // Update snapshot count
                    snapshotCount.textContent = filteredSnapshots.length;

                    // Pagination
                    const startIndex = (currentPage - 1) * itemsPerPage;
                    const endIndex = startIndex + itemsPerPage;
                    const paginatedSnapshots = filteredSnapshots.slice(startIndex, endIndex);

                    // Render snapshots
                    if (paginatedSnapshots.length > 0) {
                        snapshotList.innerHTML = paginatedSnapshots.map(snapshot => `
                            <tr>
                                <td>
                                    <strong>${snapshot.id}</strong>
                                </td>
                                <td>
                                    ${snapshot.description}
                                    <br>
                                    <small class="text-muted">${formatDate(snapshot.timestamp)}</small>
                                </td>
                                <td>
                                    <span class="badge bg-secondary">${snapshot.user}</span>
                                </td>
                                <td>
                                    ${formatDate(snapshot.timestamp)}
                                </td>
                                <td>
                                    <span class="badge bg-primary">${snapshot.entities} 个实体</span>
                                </td>
                                <td>
                                    <span class="badge bg-info">${snapshot.relationships} 个关系</span>
                                </td>
                                <td>
                                    <div class="btn-group">
                                        <button 
                                            class="btn btn-sm btn-outline-primary view-snapshot-btn"
                                            data-id="${snapshot.id}"
                                        >
                                            <i class="fa fa-eye"></i> 查看
                                        </button>
                                        <button 
                                            class="btn btn-sm btn-outline-success restore-snapshot-btn"
                                            data-id="${snapshot.id}"
                                        >
                                            <i class="fa fa-undo"></i> 恢复
                                        </button>
                                        <button 
                                            class="btn btn-sm btn-outline-danger delete-snapshot-btn"
                                            data-id="${snapshot.id}"
                                        >
                                            <i class="fa fa-trash"></i> 删除
                                        </button>
                                    </div>
                                </td>
                            </tr>
                        `).join('');

                        // Show snapshots and pagination
                        snapshotsContainer.classList.remove('d-none');
                        paginationContainer.classList.remove('d-none');
                        
                        // Update pagination info
                        showingStart.textContent = startIndex + 1;
                        showingEnd.textContent = Math.min(endIndex, filteredSnapshots.length);
                        totalSnapshots.textContent = filteredSnapshots.length;
                    } else {
                        // Show no snapshots state
                        noSnapshotsContainer.classList.remove('d-none');
                    }

                    // Hide loading state
                    loadingContainer.classList.add('d-none');

                    // Add event listeners to action buttons
                    addSnapshotActionListeners();
                } catch (error) {
                    console.error('Error loading snapshots:', error);
                    loadingContainer.innerHTML = `
                        <div class="text-center py-5">
                            <i class="fa fa-exclamation-circle fa-5x text-danger mb-3"></i>
                            <h4>加载快照失败</h4>
                            <p class="text-muted">无法加载快照。请稍后重试。</p>
                            <button id="retry-loading-btn" class="btn btn-primary mt-2">
                                <i class="fa fa-refresh"></i> 重试
                            </button>
                        </div>
                    `;
                    document.getElementById('retry-loading-btn').addEventListener('click', renderSnapshots);
                }
            }, 500);
        }

        // Add event listeners to snapshot action buttons
        function addSnapshotActionListeners() {
            // View buttons
            document.querySelectorAll('.view-snapshot-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const snapshotId = this.getAttribute('data-id');
                    viewSnapshot(snapshotId);
                });
            });

            // Restore buttons
            document.querySelectorAll('.restore-snapshot-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const snapshotId = this.getAttribute('data-id');
                    restoreSnapshot(snapshotId);
                });
            });

            // Delete buttons
            document.querySelectorAll('.delete-snapshot-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const snapshotId = this.getAttribute('data-id');
                    deleteSnapshot(snapshotId);
                });
            });
        }

        // Load snapshots
        function loadSnapshots() {
            renderSnapshots();
        }

        // View snapshot
        function viewSnapshot(id) {
            const snapshot = currentSnapshots.find(s => s.id === id);
            if (snapshot) {
                selectedSnapshot = snapshot;
                const snapshotDetails = document.getElementById('snapshot-details');
                
                snapshotDetails.innerHTML = `
                    <div class="row">
                        <div class="col-md-6">
                            <h5>快照信息</h5>
                            <table class="table table-sm">
                                <tbody>
                                    <tr>
                                        <th scope="row">ID</th>
                                        <td>${snapshot.id}</td>
                                    </tr>
                                    <tr>
                                        <th scope="row">描述</th>
                                        <td>${snapshot.description}</td>
                                    </tr>
                                    <tr>
                                        <th scope="row">创建人</th>
                                        <td>${snapshot.user}</td>
                                    </tr>
                                    <tr>
                                        <th scope="row">创建时间</th>
                                        <td>${formatDate(snapshot.timestamp)}</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                        <div class="col-md-6">
                            <h5>知识图谱统计</h5>
                            <div class="stats-grid d-grid gap-2">
                                <div class="stat-card p-3 bg-light rounded">
                                    <div class="stat-value fs-3 fw-bold text-primary">${snapshot.entities}</div>
                                    <div class="stat-label text-muted">实体总数</div>
                                </div>
                                <div class="stat-card p-3 bg-light rounded">
                                    <div class="stat-value fs-3 fw-bold text-info">${snapshot.relationships}</div>
                                    <div class="stat-label text-muted">关系总数</div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                
                viewSnapshotModal.show();
            }
        }

        // Restore snapshot
        function restoreSnapshot(id) {
            if (confirm('您确定要恢复此快照吗？这将覆盖当前的知识图谱。')) {
                // Mock restoration
                showAlert('快照恢复成功！（模拟）', 'success');
            }
        }

        // Delete snapshot
        function deleteSnapshot(id) {
            if (confirm('您确定要删除此快照吗？此操作无法撤销。')) {
                // Mock deletion
                currentSnapshots = currentSnapshots.filter(s => s.id !== id);
                renderSnapshots();
                showAlert('快照删除成功！（模拟）', 'success');
            }
        }

        // Initialize event listeners
        document.addEventListener('DOMContentLoaded', () => {
            // Load snapshots on page load
            loadSnapshots();

            // Create snapshot button
            document.getElementById('create-snapshot-btn').addEventListener('click', () => {
                document.getElementById('create-snapshot-form').reset();
                createSnapshotModal.show();
            });

            // Create first snapshot button
            document.getElementById('create-first-snapshot-btn').addEventListener('click', () => {
                document.getElementById('create-snapshot-form').reset();
                createSnapshotModal.show();
            });

            // Refresh snapshots button
            document.getElementById('refresh-snapshots-btn').addEventListener('click', () => {
                loadSnapshots();
                showAlert('快照已刷新！', 'success');
            });

            // Export snapshots button
            document.getElementById('export-snapshots-btn').addEventListener('click', () => {
                showAlert('导出功能将在此处实现。', 'info');
            });

            // Search button
            document.getElementById('search-btn').addEventListener('click', () => {
                currentPage = 1;
                renderSnapshots();
            });

            // Search input enter key
            document.getElementById('snapshot-search').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    currentPage = 1;
                    renderSnapshots();
                }
            });

            // Create snapshot form submission
            document.getElementById('create-snapshot-form').addEventListener('submit', (e) => {
                e.preventDefault();
                
                const description = document.getElementById('snapshot-description').value;
                const tags = document.getElementById('snapshot-tags').value;
                const includeMetadata = document.getElementById('include-metadata').checked;

                // Mock snapshot creation
                showAlert('快照创建成功！（模拟）', 'success');
                createSnapshotModal.hide();
                loadSnapshots();
            });

            // Restore snapshot from view modal
            document.getElementById('restore-snapshot-btn').addEventListener('click', () => {
                if (selectedSnapshot) {
                    restoreSnapshot(selectedSnapshot.id);
                    viewSnapshotModal.hide();
                }
            });
        });
    </script>
{% endblock %}
