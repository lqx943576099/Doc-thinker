{% extends "base_modern.html" %}

{% block title %}知识图谱 - NeuroAgent{% endblock %}

{% block extra_css %}
<style>
    .node circle { cursor: pointer; transition: all 0.2s; }
    .node:hover circle { r: 20; }
    .link { stroke: #cbd5e1; stroke-opacity: 0.6; }
    .node-label { font-size: 11px; fill: #64748b; pointer-events: none; }
    .level-3 { fill: #ec4899; }
    .level-2 { fill: #3b82f6; }
    .level-1 { fill: #10b981; }
</style>
{% endblock %}

{% block content %}
<header class="bg-white border-b border-slate-200 px-6 py-4 flex items-center justify-between shrink-0">
    <div>
        <h2 class="text-lg font-semibold text-slate-800">知识图谱</h2>
        <p class="text-sm text-slate-500">可视化展示知识关联与层次结构</p>
    </div>
    <div class="flex gap-2">
        <button onclick="resetZoom()" class="btn-secondary px-4 py-2 rounded-lg text-sm">重置视图</button>
        <button onclick="refreshGraph()" class="btn-primary px-4 py-2 rounded-lg text-sm">刷新</button>
    </div>
</header>

<div class="flex-1 flex overflow-hidden">
    <div class="flex-1 relative bg-slate-50">
        <div id="graph-container" class="absolute inset-0"></div>
        
        <!-- Controls -->
        <div class="absolute top-4 left-4 space-y-3">
            <div class="card p-3">
                <input type="text" id="search-input" placeholder="搜索节点..." 
                    class="input-field px-3 py-2 rounded-lg text-sm w-48"
                    oninput="searchNodes(this.value)">
            </div>
            
            <div class="card p-3">
                <p class="text-xs font-semibold text-slate-500 mb-2">层级筛选</p>
                <div class="space-y-2">
                    <label class="flex items-center gap-2 text-sm cursor-pointer">
                        <input type="checkbox" checked onchange="toggleLevel(3)" class="rounded">
                        <span class="w-2 h-2 rounded-full bg-pink-500"></span>
                        <span class="text-slate-600">Domain</span>
                    </label>
                    <label class="flex items-center gap-2 text-sm cursor-pointer">
                        <input type="checkbox" checked onchange="toggleLevel(2)" class="rounded">
                        <span class="w-2 h-2 rounded-full bg-blue-500"></span>
                        <span class="text-slate-600">Concept</span>
                    </label>
                    <label class="flex items-center gap-2 text-sm cursor-pointer">
                        <input type="checkbox" checked onchange="toggleLevel(1)" class="rounded">
                        <span class="w-2 h-2 rounded-full bg-green-500"></span>
                        <span class="text-slate-600">Instance</span>
                    </label>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Detail Panel -->
    <div id="detail-panel" class="hidden w-80 bg-white border-l border-slate-200 overflow-y-auto">
        <div class="p-5">
            <div class="flex items-center justify-between mb-4">
                <h3 id="detail-name" class="font-semibold text-slate-800">节点名称</h3>
                <button onclick="closePanel()" class="text-slate-400 hover:text-slate-600">
                    <i class="fa-solid fa-times"></i>
                </button>
            </div>
            <div class="space-y-3">
                <div class="flex justify-between p-3 bg-slate-50 rounded-lg">
                    <span class="text-sm text-slate-500">层级</span>
                    <span id="detail-level" class="text-sm font-medium">-</span>
                </div>
                <div class="flex justify-between p-3 bg-slate-50 rounded-lg">
                    <span class="text-sm text-slate-500">连接数</span>
                    <span id="detail-connections" class="text-sm font-medium text-blue-600">-</span>
                </div>
            </div>
            <button onclick="focusNode()" class="btn-primary w-full mt-4 py-2 rounded-lg text-sm">聚焦节点</button>
        </div>
    </div>
</div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
let svg, g, simulation, node, link, label;
let currentTransform = d3.zoomIdentity;
let graphData = { nodes: [], links: [] };
let selectedNode = null;
let visibleLevels = { 1: true, 2: true, 3: true };

window.onload = initGraph;

function initGraph() {
    const container = document.getElementById('graph-container');
    const width = container.clientWidth;
    const height = container.clientHeight;
    
    svg = d3.select('#graph-container').append('svg')
        .attr('width', width).attr('height', height);
    
    const zoom = d3.zoom().scaleExtent([0.1, 4]).on('zoom', (e) => {
        currentTransform = e.transform;
        g.attr('transform', e.transform);
    });
    svg.call(zoom);
    
    g = svg.append('g');
    
    useDemoData();
    
    window.addEventListener('resize', () => {
        svg.attr('width', container.clientWidth).attr('height', container.clientHeight);
    });
}

function useDemoData() {
    graphData = {
        nodes: [
            { id: 'AI', name: '人工智能', level: 3, connections: ['ML', 'NLP', 'CV'] },
            { id: 'ML', name: '机器学习', level: 2, connections: ['DL', 'NN', 'AI'] },
            { id: 'DL', name: '深度学习', level: 2, connections: ['CNN', 'RNN', 'Transformer', 'ML'] },
            { id: 'NN', name: '神经网络', level: 2, connections: ['CNN', 'RNN', 'ML'] },
            { id: 'CNN', name: 'CNN', level: 1, connections: ['DL', 'NN'] },
            { id: 'RNN', name: 'RNN', level: 1, connections: ['DL', 'NN'] },
            { id: 'Transformer', name: 'Transformer', level: 1, connections: ['DL', 'LLM'] },
            { id: 'LLM', name: '大语言模型', level: 1, connections: ['Transformer', 'NLP'] },
            { id: 'NLP', name: 'NLP', level: 2, connections: ['LLM', 'AI'] },
            { id: 'CV', name: '计算机视觉', level: 2, connections: ['CNN', 'AI'] },
        ],
        links: [
            { source: 'AI', target: 'ML' }, { source: 'AI', target: 'NLP' }, { source: 'AI', target: 'CV' },
            { source: 'ML', target: 'DL' }, { source: 'ML', target: 'NN' },
            { source: 'DL', target: 'CNN' }, { source: 'DL', target: 'RNN' }, { source: 'DL', target: 'Transformer' },
            { source: 'NN', target: 'CNN' }, { source: 'NN', target: 'RNN' },
            { source: 'Transformer', target: 'LLM' },
            { source: 'NLP', target: 'LLM' },
        ]
    };
    renderGraph();
}

function renderGraph() {
    g.selectAll('*').remove();
    
    const visibleNodes = graphData.nodes.filter(n => visibleLevels[n.level]);
    const visibleNodeIds = new Set(visibleNodes.map(n => n.id));
    const visibleLinks = graphData.links.filter(l => 
        visibleNodeIds.has(typeof l.source === 'object' ? l.source.id : l.source) && 
        visibleNodeIds.has(typeof l.target === 'object' ? l.target.id : l.target)
    );
    
    const container = document.getElementById('graph-container');
    const width = container.clientWidth;
    const height = container.clientHeight;
    
    simulation = d3.forceSimulation(visibleNodes)
        .force('link', d3.forceLink(visibleLinks).id(d => d.id).distance(100))
        .force('charge', d3.forceManyBody().strength(-300))
        .force('center', d3.forceCenter(width / 2, height / 2));
    
    link = g.append('g').selectAll('line').data(visibleLinks)
        .enter().append('line').attr('class', 'link').attr('stroke-width', 1.5);
    
    node = g.append('g').selectAll('g').data(visibleNodes)
        .enter().append('g').attr('class', 'node')
        .call(d3.drag().on('start', dragstarted).on('drag', dragged).on('end', dragended))
        .on('click', (e, d) => selectNode(d));
    
    node.append('circle')
        .attr('r', d => 10 + d.level * 5)
        .attr('class', d => `level-${d.level}`);
    
    label = g.append('g').selectAll('text').data(visibleNodes)
        .enter().append('text').attr('class', 'node-label')
        .attr('dy', d => 25 + d.level * 5)
        .attr('text-anchor', 'middle')
        .text(d => d.name);
    
    simulation.on('tick', () => {
        link.attr('x1', d => d.source.x).attr('y1', d => d.source.y)
            .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
        node.attr('transform', d => `translate(${d.x},${d.y})`);
        label.attr('x', d => d.x).attr('y', d => d.y);
    });
}

function selectNode(d) {
    selectedNode = d;
    document.getElementById('detail-panel').classList.remove('hidden');
    document.getElementById('detail-name').textContent = d.name;
    document.getElementById('detail-level').textContent = ['Instance', 'Concept', 'Domain'][d.level - 1];
    document.getElementById('detail-connections').textContent = d.connections ? d.connections.length : 0;
}

function closePanel() {
    document.getElementById('detail-panel').classList.add('hidden');
}

function focusNode() {
    if (!selectedNode) return;
    const container = document.getElementById('graph-container');
    svg.transition().duration(750).call(
        d3.zoom().transform,
        d3.zoomIdentity.translate(container.clientWidth/2, container.clientHeight/2).scale(1.5)
            .translate(-selectedNode.x, -selectedNode.y)
    );
}

function toggleLevel(level) {
    visibleLevels[level] = !visibleLevels[level];
    renderGraph();
}

function searchNodes(query) {
    if (!query) {
        node.attr('opacity', 1);
        label.attr('opacity', 1);
        return;
    }
    const q = query.toLowerCase();
    node.attr('opacity', d => d.name.toLowerCase().includes(q) ? 1 : 0.2);
    label.attr('opacity', d => d.name.toLowerCase().includes(q) ? 1 : 0.2);
}

function resetZoom() {
    svg.transition().duration(750).call(d3.zoom().transform, d3.zoomIdentity);
}

function refreshGraph() {
    showToast('知识图谱已刷新', 'success');
}

function dragstarted(e, d) { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; }
function dragged(e, d) { d.fx = e.x; d.fy = e.y; }
function dragended(e, d) { if (!e.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; }
</script>
{% endblock %}
