{% extends "base_modern.html" %}

{% block title %}文档上传 - NeuroAgent{% endblock %}

{% block extra_css %}
<style>
    .upload-box {
        border: 2px dashed #cbd5e1;
        background: #f8fafc;
        transition: all 0.2s;
    }
    .upload-box:hover {
        border-color: #3b82f6;
        background: #eff6ff;
    }
    .upload-box.dragover {
        border-color: #3b82f6;
        background: #dbeafe;
    }
    
    .progress-bg {
        background: #e2e8f0;
        border-radius: 999px;
        height: 8px;
        overflow: hidden;
    }
    .progress-bar {
        background: #3b82f6;
        height: 100%;
        transition: width 0.3s;
    }
</style>
{% endblock %}

{% block content %}
<!-- Header -->
<div class="bg-white border-b border-slate-200 px-6 py-4">
    <h1 class="text-xl font-semibold text-slate-800">文档上传</h1>
    <p class="text-sm text-slate-500 mt-1">上传文档到知识库</p>
</div>

<!-- Content -->
<div class="flex-1 overflow-y-auto p-6">
    <div class="max-w-2xl mx-auto">
        
        <!-- Upload Area -->
        <div class="bg-white rounded-xl border border-slate-200 p-6 mb-6">
            <div id="upload-area" class="upload-box rounded-lg p-8 text-center cursor-pointer" onclick="document.getElementById('file-input').click()">
                <input type="file" id="file-input" multiple style="display: none;" onchange="handleFiles(this.files)">
                
                <div class="w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fa-solid fa-cloud-arrow-up text-2xl text-blue-600"></i>
                </div>
                
                <h3 class="text-lg font-medium text-slate-700 mb-2">点击上传文件</h3>
                <p class="text-sm text-slate-500 mb-4">或将文件拖拽到此处</p>
                
                <button type="button" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2.5 rounded-lg font-medium transition-colors" onclick="event.stopPropagation(); document.getElementById('file-input').click()">
                    <i class="fa-solid fa-folder-open mr-2"></i>
                    选择文件
                </button>
            </div>
        </div>
        
        <!-- File List -->
        <div id="file-list"></div>
        
        <!-- Supported Formats -->
        <div class="bg-white rounded-xl border border-slate-200 p-6">
            <h3 class="text-sm font-semibold text-slate-700 mb-4">支持的文件格式</h3>
            <div class="grid grid-cols-4 gap-4">
                <div class="text-center p-3 bg-slate-50 rounded-lg">
                    <i class="fa-solid fa-file-pdf text-2xl text-red-500 mb-2"></i>
                    <p class="text-xs text-slate-600">PDF</p>
                </div>
                <div class="text-center p-3 bg-slate-50 rounded-lg">
                    <i class="fa-solid fa-file-word text-2xl text-blue-500 mb-2"></i>
                    <p class="text-xs text-slate-600">Word</p>
                </div>
                <div class="text-center p-3 bg-slate-50 rounded-lg">
                    <i class="fa-solid fa-file-image text-2xl text-green-500 mb-2"></i>
                    <p class="text-xs text-slate-600">图片</p>
                </div>
                <div class="text-center p-3 bg-slate-50 rounded-lg">
                    <i class="fa-solid fa-file-lines text-2xl text-gray-500 mb-2"></i>
                    <p class="text-xs text-slate-600">文本</p>
                </div>
            </div>
        </div>
        
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
// Drag and drop
const uploadArea = document.getElementById('upload-area');

uploadArea.addEventListener('dragover', (e) => {
    e.preventDefault();
    uploadArea.classList.add('dragover');
});

uploadArea.addEventListener('dragleave', () => {
    uploadArea.classList.remove('dragover');
});

uploadArea.addEventListener('drop', (e) => {
    e.preventDefault();
    uploadArea.classList.remove('dragover');
    handleFiles(e.dataTransfer.files);
});

function handleFiles(files) {
    Array.from(files).forEach(file => {
        if (file.size > 50 * 1024 * 1024) {
            showToast('文件大小超过50MB限制', 'error');
            return;
        }
        uploadFile(file);
    });
}

function uploadFile(file) {
    const fileId = 'f' + Date.now();
    const list = document.getElementById('file-list');
    
    // Create file item
    const item = document.createElement('div');
    item.id = fileId;
    item.className = 'bg-white rounded-xl border border-slate-200 p-4 mb-3';
    item.innerHTML = `
        <div class="flex items-center gap-3 mb-3">
            <div class="w-10 h-10 bg-slate-100 rounded-lg flex items-center justify-center">
                <i class="fa-solid fa-file text-slate-500"></i>
            </div>
            <div class="flex-1 min-w-0">
                <p class="font-medium text-slate-700 truncate">${file.name}</p>
                <p class="text-xs text-slate-500">${formatSize(file.size)}</p>
            </div>
            <span class="status text-xs font-medium text-slate-500">准备上传</span>
            <button onclick="document.getElementById('${fileId}').remove()" class="text-slate-400 hover:text-red-500">
                <i class="fa-solid fa-times"></i>
            </button>
        </div>
        <div class="progress-bg">
            <div class="progress-bar" style="width: 0%"></div>
        </div>
        <div class="text-right text-xs text-slate-500 mt-1">
            <span class="progress-text">0%</span>
        </div>
    `;
    
    list.insertBefore(item, list.firstChild);
    
    // Upload
    const formData = new FormData();
    formData.append('file', file);
    
    const status = item.querySelector('.status');
    const progressBar = item.querySelector('.progress-bar');
    const progressText = item.querySelector('.progress-text');
    
    status.textContent = '上传中...';
    status.className = 'status text-xs font-medium text-blue-600';
    
    // Simulate progress
    let progress = 0;
    const interval = setInterval(() => {
        progress += Math.random() * 15;
        if (progress > 90) progress = 90;
        progressBar.style.width = progress + '%';
        progressText.textContent = Math.round(progress) + '%';
    }, 200);
    
    fetch('/api/v1/upload', {
        method: 'POST',
        body: formData
    })
    .then(res => res.json())
    .then(data => {
        clearInterval(interval);
        progressBar.style.width = '100%';
        progressText.textContent = '100%';
        
        if (data.success) {
            status.textContent = '完成';
            status.className = 'status text-xs font-medium text-green-600';
            showToast(`"${file.name}" 上传成功`, 'success');
        } else {
            throw new Error(data.message || '上传失败');
        }
    })
    .catch(err => {
        clearInterval(interval);
        status.textContent = '失败';
        status.className = 'status text-xs font-medium text-red-600';
        progressBar.style.background = '#ef4444';
        showToast(`上传失败: ${err.message}`, 'error');
    });
}

function formatSize(bytes) {
    if (bytes === 0) return '0 B';
    const k = 1024;
    const sizes = ['B', 'KB', 'MB', 'GB'];
    const i = Math.floor(Math.log(bytes) / Math.log(k));
    return (bytes / Math.pow(k, i)).toFixed(1) + ' ' + sizes[i];
}
</script>
{% endblock %}
