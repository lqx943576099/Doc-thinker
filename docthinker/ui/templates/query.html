{% extends "base.html" %}
{% block content %}
    <!-- Chat Container -->
    <div class="chat-container">
        <!-- Chat Header -->
        <div class="chat-header d-flex justify-content-between align-items-center">
            <h3 style="font-size: 1.2rem; font-weight: 600;">
                whitecat
            </h3>
            <div class="d-flex gap-2 align-items-center flex-wrap">
                <!-- KG Buttons - Simplified to ensure visibility -->
                <a href="/kg-viz" style="background:#764ba2;color:white;padding:6px 12px;border-radius:6px;text-decoration:none;font-size:13px;white-space:nowrap;">
                    KG可视化
                </a>
                <a href="/knowledge-graph" style="background:#ff6b35;color:white;padding:6px 12px;border-radius:6px;text-decoration:none;font-size:13px;white-space:nowrap;">
                    KG管理
                </a>
                <div class="form-check form-switch d-flex align-items-center mb-0">
                    <input class="form-check-input" type="checkbox" id="thinking-toggle">
                    <label class="form-check-label ms-2" for="thinking-toggle" style="font-size: 0.85rem; color: #666; white-space: nowrap;">深度思考</label>
                </div>
                <button class="btn btn-sm btn-outline-secondary" onclick="showSessionFiles()" title="查看会话文件">
                    <i class="fa fa-folder-o"></i>
                </button>
                <input type="text" class="form-control form-control-sm" id="retrieval-instruction" placeholder="检索指令" style="width: 200px !important; font-size: 0.8rem !important; border-radius: 12px !important; background-color: #ffffff !important; color: #000000 !important; border: 2px solid #ff6b35 !important; display: block !important;">
                 <select class="form-select form-select-sm" id="memory-mode-select" onchange="currentMemoryMode = this.value" style="width: auto !important; font-size: 0.8rem !important; border-radius: 12px !important; background-color: #ffffff !important; color: #000000 !important; border: 2px solid #ff6b35 !important; display: block !important;">
                    <option value="session" selected>当前会话记忆</option>
                    <option value="global">全局知识库</option>
                    <option value="hybrid">混合模式</option>
                </select>
            </div>
        </div>

        <!-- Chat Messages -->
        <div class="chat-messages" id="chat-messages">
            <!-- Welcome Message -->
            <div class="message system">
                <div class="message-bubble">
                    <p style="margin: 0 0 8px 0; font-size: 0.95rem; line-height: 1.5;">你好！我是 whitecat 智能助手，很高兴为您服务。</p>
                    <p style="margin: 0; font-size: 0.95rem; line-height: 1.5;">请输入您的查询，我将尽力为您提供准确的回答。</p>
                    <div class="message-info">
                        <small>whitecat • 刚刚</small>
                    </div>
                </div>
            </div>
        </div>

        <!-- Chat Input -->
        <div class="chat-input-container">
            <!-- Progress Bar Container -->
            <div id="upload-progress-container" class="d-none mb-2" style="padding: 0 10px;">
                <div class="d-flex justify-content-between align-items-center mb-1">
                    <span id="upload-status-text" style="font-size: 0.75rem; color: #666666;">正在上传文件...</span>
                    <span id="upload-progress-percent" style="font-size: 0.75rem; color: #ff6b35; font-weight: 600;">0%</span>
                </div>
                <div class="progress" style="height: 4px; background-color: #e0e0e0; border-radius: 2px; overflow: hidden;">
                    <div id="upload-progress-bar" class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar" style="width: 0%; background-color: #ff6b35; transition: width 0.2s ease;" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
                </div>
            </div>

            <!-- Input Form -->
            <form id="chat-form">
                <div class="chat-input-form">
                    <!-- File Upload Button -->
                    <div class="position-relative">
                        <input 
                            type="file" 
                            id="file-upload-input" 
                            class="d-none" 
                            multiple
                            onchange="handleFileUpload(this.files)"
                        >
                        <button 
                            type="button"
                            class="file-upload-btn" 
                            id="file-upload-btn-trigger"
                            onclick="document.getElementById('file-upload-input').click()"
                            title="上传文件"
                            style="background-color: transparent; color: #666666; border-radius: 50%; width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); flex-shrink: 0; cursor: pointer; border: none;"
                        >
                            <i class="fa fa-paperclip" style="font-size: 1.2rem;"></i>
                        </button>
                    </div>
                    
                    <!-- Text Input -->
                    <textarea 
                        id="chat-input" 
                        class="chat-textarea" 
                        placeholder="在此输入您的查询..." 
                        rows="1"
                        onkeydown="handleKeyDown(event)"
                        ondragover="handleDragOver(event)"
                        ondragleave="handleDragLeave(event)"
                        ondrop="handleDrop(event)"
                    ></textarea>
                    
                    <!-- Send Button -->
                    <button 
                        type="submit" 
                        class="chat-submit-btn"
                        id="chat-submit-btn"
                        title="发送消息"
                        style="background-color: #ff6b35 !important; width: 42px; height: 42px;"
                    >
                        <i class="fa fa-paper-plane" style="font-size: 1.1rem;"></i>
                    </button>

                    <button
                        type="button"
                        class="chat-submit-btn"
                        id="stream-submit-btn"
                        title="沉淀为记忆"
                        style="background-color: #ffffff !important; width: 42px; height: 42px; border: 2px solid #ff6b35; color: #ff6b35;"
                        onclick="ingestStream()"
                    >
                        <i class="fa fa-lightbulb-o" style="font-size: 1.1rem;"></i>
                    </button>
                </div>
            </form>
            
            <!-- Selected Files List - Moved to bottom left -->
            <div id="selected-files" class="d-none" style="max-width: 80%; margin-top: 8px; margin-left: 4px; text-align: left;">
                <h6 class="mb-1" style="color: #ff6b35; font-size: 0.75rem; font-weight: 500;"><i class="fa fa-paperclip"></i> 已选择文件：</h6>
                <div id="files-list" class="d-flex flex-wrap gap-1"></div>
            </div>
        </div>
    </div>

    <!-- Session Files Modal -->
    <div class="modal fade" id="filesModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">会话文件列表</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div id="session-files-list" class="list-group">
                        <div class="text-center text-muted py-3">加载中...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Global variables
        let currentQueryMode = 'hybrid';
        let currentMemoryMode = 'session'; // Default to session memory
        let chatHistory = [];
        let isLoading = false;
        
        let filesModal = null;

        function ensureFilesModal() {
            if (!filesModal) {
                filesModal = new bootstrap.Modal(document.getElementById('filesModal'));
            }
            return filesModal;
        }
        
        // Show session files
        async function showSessionFiles() {
            if (!currentSessionId) {
                showAlert('请先选择一个会话', 'warning');
                return;
            }
            
            ensureFilesModal().show();
            const container = document.getElementById('session-files-list');
            container.innerHTML = '<div class="text-center text-muted py-3">加载中...</div>';
            
            try {
                const data = await fetchData(`${API_PREFIX}/sessions/${currentSessionId}/files`);
                container.innerHTML = '';
                
                if (data.files && data.files.length > 0) {
                    data.files.forEach(file => {
                        const item = document.createElement('div');
                        item.className = 'list-group-item d-flex justify-content-between align-items-center';
                        item.innerHTML = `
                            <div>
                                <i class="fa fa-file-text-o me-2"></i>
                                ${file.filename}
                            </div>
                            <small class="text-muted">${new Date(file.created_at).toLocaleString()}</small>
                        `;
                        container.appendChild(item);
                    });
                } else {
                    container.innerHTML = '<div class="text-center text-muted py-3">暂无文件</div>';
                }
            } catch (error) {
                console.error(error);
                container.innerHTML = '<div class="text-center text-danger py-3">加载失败</div>';
            }
        }

        // Listen for session changes from base.html
        document.addEventListener('sessionChanged', function(e) {
            const sessionId = e.detail.sessionId;
            loadHistory(sessionId);
        });

        async function loadHistory(sessionId) {
            const chatMessages = document.getElementById('chat-messages');
            chatMessages.innerHTML = ''; // Clear current messages
            
            // Add welcome message back
            chatMessages.innerHTML = `
                <div class="message system">
                    <div class="message-bubble">
                        <p style="margin: 0 0 8px 0; font-size: 0.95rem; line-height: 1.5;">你好！我是 whitecat 智能助手，很高兴为您服务。</p>
                        <p style="margin: 0; font-size: 0.95rem; line-height: 1.5;">请输入您的查询，我将尽力为您提供准确的回答。</p>
                        <div class="message-info">
                            <small>whitecat • 刚刚</small>
                        </div>
                    </div>
                </div>
            `;
            
            try {
                const data = await fetchData(`${API_PREFIX}/sessions/${sessionId}/history`);
                const history = data.history;
                
                history.forEach(msg => {
                    addMessage(msg.role, msg.content);
                });
                
            } catch (error) {
                console.error("Failed to load history", error);
                showAlert("无法加载历史记录", "danger");
            }
        }

        // Auto-resize textarea
        const chatInput = document.getElementById('chat-input');
        chatInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 150) + 'px';
        });
        
        // ... (rest of the file) ...
        
        // File upload variables
        let selectedFiles = [];
        const fileUploadInput = document.getElementById('file-upload-input');
        const fileUploadBtn = document.getElementById('file-upload-btn');
        const selectedFilesDiv = document.getElementById('selected-files');
        const filesListDiv = document.getElementById('files-list');
        
        // Handle file upload button click removed to avoid double trigger with label 'for'
        
        function startUploadFallbackProgress(progressBar, progressPercent, statusText) {
            let percent = 10;
            let timer = setInterval(() => {
                percent = Math.min(90, percent + Math.max(1, Math.round((90 - percent) * 0.15)));
                progressBar.style.width = percent + '%';
                progressPercent.textContent = percent + '%';
            }, 900);
            statusText.textContent = '正在上传文件...';

            return () => {
                if (timer) {
                    clearInterval(timer);
                    timer = null;
                }
            };
        }

        // Poll file processing status
        async function pollFileStatus(sessionId, filenames) {
            const progressBar = document.getElementById('upload-progress-bar');
            const statusText = document.getElementById('upload-status-text');
            const maxAttempts = 60; // 2 minutes max (2s interval)
            let attempts = 0;
            
            while (attempts < maxAttempts) {
                try {
                    const data = await fetchData(`${API_PREFIX}/sessions/${sessionId}/files`);
                    if (data.files) {
                        const pendingFiles = data.files.filter(f => 
                            filenames.includes(f.filename) && f.status !== 'processed' && f.status !== 'failed'
                        );
                        
                        const processedCount = filenames.length - pendingFiles.length;
                        const percent = Math.round((processedCount / filenames.length) * 100);
                        
                        // If all processed (or failed), break
                        if (pendingFiles.length === 0) {
                            progressBar.style.width = '100%';
                            statusText.textContent = '处理完成';
                            return;
                        }
                        
                        statusText.textContent = `正在处理... (${processedCount}/${filenames.length})`;
                        // Keep progress bar animated/striped, maybe pulsing?
                        // Just keep it at 100% striped to show activity, or fake progress
                    }
                } catch (e) {
                    console.error("Polling error:", e);
                }
                
                await new Promise(resolve => setTimeout(resolve, 2000));
                attempts++;
            }
            
            statusText.textContent = '处理超时，请稍后检查';
        }

        // Handle file selection
        async function handleFileUpload(files) {
            if (!files || files.length === 0) return;

            const progressContainer = document.getElementById('upload-progress-container');
            const progressBar = document.getElementById('upload-progress-bar');
            const progressPercent = document.getElementById('upload-progress-percent');
            const statusText = document.getElementById('upload-status-text');
            
            progressContainer.classList.remove('d-none');
            progressContainer.style.display = 'block';
            progressBar.style.width = '10%';
            progressPercent.textContent = '10%';
            statusText.textContent = '准备上传...';

            if (!currentSessionId) {
                try {
                    await newConversation();
                } catch (e) {
                    console.error("Failed to create session for upload", e);
                    showAlert("无法创建会话，上传失败", "danger");
                    progressContainer.classList.add('d-none');
                    return;
                }
            }

            statusText.textContent = '正在上传文件...';

            const newFiles = [];
            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                file.uploaded = false;
                selectedFiles.push(file);
                newFiles.push(file);
            }
            updateFilesList();

            const formData = new FormData();
            formData.append('session_id', currentSessionId);
            formData.append('mode', currentQueryMode);
            
            newFiles.forEach(file => {
                formData.append('files', file);
            });

            let stopFallbackProgress = null;
            try {
                const uploadPromise = new Promise((resolve, reject) => {
                    const xhr = new XMLHttpRequest();
                    let hasRealProgress = false;
                    stopFallbackProgress = startUploadFallbackProgress(progressBar, progressPercent, statusText);
                    
                    xhr.upload.onprogress = (event) => {
                        if (event.lengthComputable) {
                            hasRealProgress = true;
                            stopFallbackProgress();
                            const percent = Math.round((event.loaded / event.total) * 100);
                            progressBar.style.width = percent + '%';
                            progressPercent.textContent = percent + '%';
                            if (percent === 100) {
                                statusText.textContent = '文件上传完成，正在处理...';
                            }
                        } else if (!hasRealProgress) {
                            statusText.textContent = '正在上传文件（无法计算进度）...';
                        }
                    };

                    xhr.upload.onload = () => {
                        if (stopFallbackProgress) {
                            stopFallbackProgress();
                        }
                        progressBar.style.width = '100%';
                        progressPercent.textContent = '100%';
                        statusText.textContent = '文件上传完成，正在处理...';
                    };

                    xhr.onload = () => {
                        if (stopFallbackProgress) {
                            stopFallbackProgress();
                        }
                        if (xhr.status >= 200 && xhr.status < 300) {
                            try {
                                const response = JSON.parse(xhr.responseText);
                                resolve(response);
                            } catch (e) {
                                reject(new Error('解析服务器响应失败'));
                            }
                        } else {
                            reject(new Error(`上传失败: ${xhr.statusText || xhr.status}`));
                        }
                    };

                    xhr.onerror = () => {
                        if (stopFallbackProgress) {
                            stopFallbackProgress();
                        }
                        reject(new Error('网络连接错误，上传失败'));
                    };
                    xhr.ontimeout = () => {
                        if (stopFallbackProgress) {
                            stopFallbackProgress();
                        }
                        reject(new Error('上传超时，请稍后重试'));
                    };
                    
                    xhr.open('POST', `${API_PREFIX}/upload`);
                    xhr.send(formData);
                });

                const uploadResult = await uploadPromise;
                
                // Mark files as uploaded
                newFiles.forEach(file => {
                    file.uploaded = true;
                });
                updateFilesList();
                
                progressBar.style.width = '100%';
                progressPercent.textContent = '100%';

                setTimeout(() => {
                    progressContainer.classList.add('d-none');
                    progressBar.style.width = '0%';
                    progressContainer.style.display = '';
                }, 1500);
                
                const uploadedNames = newFiles.map(f => f.name).join(', ');
                // addMessage('system', `✅ 文件上传并处理成功！\n已上传文件：${uploadedNames}`, uploadResult);
                
                // Start polling for processing status
                statusText.textContent = '文件上传成功，正在后台处理...';
                progressBar.classList.add('progress-bar-striped', 'progress-bar-animated');
                
                // Disable input during processing
                const chatInput = document.getElementById('chat-input');
                const submitBtn = document.getElementById('chat-submit-btn');
                chatInput.disabled = true;
                submitBtn.disabled = true;
                chatInput.placeholder = '等待文件处理完成...';

                await pollFileStatus(currentSessionId, newFiles.map(f => f.name));

                // Re-enable input
                chatInput.disabled = false;
                submitBtn.disabled = false;
                chatInput.placeholder = '在此输入您的查询...';
                
                progressBar.classList.remove('progress-bar-striped', 'progress-bar-animated');
                
                setTimeout(() => {
                    progressContainer.classList.add('d-none');
                    progressBar.style.width = '0%';
                    progressContainer.style.display = '';
                }, 1500);
                
                addMessage('system', `✅ 文件处理完成！\n已就绪文件：${uploadedNames}`, uploadResult);
                
            } catch (error) {
                console.error('Upload error:', error);
                statusText.textContent = '上传失败';
                showAlert(`文件上传失败: ${error.message}`, 'danger');
                
                // Remove failed files from selectedFiles
                newFiles.forEach(f => {
                    const idx = selectedFiles.indexOf(f);
                    if (idx > -1) selectedFiles.splice(idx, 1);
                });
                updateFilesList();
                
                setTimeout(() => {
                    progressContainer.classList.add('d-none');
                    progressContainer.style.display = '';
                }, 3000);
            }
        }
        
        // Update files list display
        function updateFilesList() {
            if (selectedFiles.length > 0) {
                selectedFilesDiv.classList.remove('d-none');
                filesListDiv.innerHTML = '';
                
                selectedFiles.forEach((file, index) => {
                    const fileItem = document.createElement('div');
                    fileItem.className = 'd-flex align-items-center gap-2 rounded px-3 py-1';
                    fileItem.style.backgroundColor = file.uploaded ? '#e6fffa' : '#f8f5f2';
                    fileItem.style.border = '1px solid ' + (file.uploaded ? '#10a37f' : '#ff6b35');
                    fileItem.style.color = '#333333';
                    fileItem.style.borderRadius = '12px';
                    
                    let icon = '<i class="fa fa-file-o" style="color: #ff6b35;"></i>';
                    if (file.uploaded) {
                        icon = '<i class="fa fa-check-circle" style="color: #10a37f;"></i>';
                    }
                    
                    fileItem.innerHTML = `
                        ${icon}
                        <span class="file-name" style="max-width: 150px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: 0.85rem; color: #333333;">${file.name}</span>
                        <span class="file-size" style="font-size: 0.75rem; opacity: 0.7; color: #666666;">${formatFileSize(file.size)}</span>
                        <button type="button" class="btn btn-sm btn-danger p-0 px-2" onclick="removeFile(${index})" title="移除文件" style="background-color: transparent; border: none; color: #ff6b35; font-size: 0.75rem; padding: 0.25rem 0.5rem;">
                            <i class="fa fa-times"></i>
                        </button>
                    `;
                    filesListDiv.appendChild(fileItem);
                });
            } else {
                selectedFilesDiv.classList.add('d-none');
            }
        }
        
        // Format file size
        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }
        
        // Remove file from list
        function removeFile(index) {
            selectedFiles.splice(index, 1);
            updateFilesList();
        }
        
        // Clear all files
        function clearFiles() {
            selectedFiles = [];
            updateFilesList();
        }
        
        // Handle drag over
        function handleDragOver(event) {
            event.preventDefault();
            chatInput.style.borderColor = '#10a37f';
            chatInput.style.boxShadow = '0 0 0 2px rgba(16, 163, 127, 0.2)';
        }
        
        // Handle drag leave
        function handleDragLeave(event) {
            chatInput.style.borderColor = '';
            chatInput.style.boxShadow = '';
        }
        
        // Handle drop
        function handleDrop(event) {
            event.preventDefault();
            chatInput.style.borderColor = '';
            chatInput.style.boxShadow = '';
            
            if (event.dataTransfer.files && event.dataTransfer.files.length > 0) {
                handleFileUpload(event.dataTransfer.files);
            }
        }

        // Handle form submission
        document.getElementById('chat-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            await sendMessage();
        });

        // Handle Enter key (with Shift for new line)
        function handleKeyDown(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        // Set query mode
        function setQueryMode(mode) {
            // Update active class
            document.querySelectorAll('.chat-option').forEach(option => {
                option.classList.remove('active');
            });
            document.querySelector(`[data-mode="${mode}"]`).classList.add('active');
            currentQueryMode = mode;
        }

        // Insert example query
        function insertExample(query) {
            chatInput.value = query;
            chatInput.style.height = 'auto';
            chatInput.style.height = Math.min(chatInput.scrollHeight, 150) + 'px';
            chatInput.focus();
        }

        // Send message
        async function sendMessage() {
            const message = chatInput.value.trim();
            
            // Check if there's any content to send
            if ((!message && selectedFiles.length === 0) || isLoading) return;

            isLoading = true;
            
            // Clear input
            chatInput.value = '';
            chatInput.style.height = 'auto';
            
            // Create message content including files
            let messageContent = message;
            if (selectedFiles.length > 0) {
                const fileNames = selectedFiles.map(file => file.name).join(', ');
                messageContent += (message ? '\n\n' : '') + `📎 相关文件：${fileNames}`;
            }
            
            // Add user message to chat
            addMessage('user', messageContent);
            
            // Add loading indicator
            const loadingElement = addLoadingIndicator();
            
            try {
                // Check if we need to upload remaining files
                const filesToUpload = selectedFiles.filter(f => !f.uploaded);
                
                if (filesToUpload.length > 0) {
                    if (!currentSessionId) {
                        try {
                            await newConversation();
                        } catch (e) {
                            throw new Error('无法创建会话，上传失败');
                        }
                    }
                    const formData = new FormData();
                    formData.append('query', message);
                    formData.append('mode', currentQueryMode);
                    
                    // Add session ID if available
                    if (currentSessionId) {
                        formData.append('session_id', currentSessionId);
                    }
                    
                    // Add files to FormData
                    filesToUpload.forEach(file => {
                        formData.append('files', file);
                    });
                    
                    // Show progress bar
                    const progressContainer = document.getElementById('upload-progress-container');
                    const progressBar = document.getElementById('upload-progress-bar');
                    const progressPercent = document.getElementById('upload-progress-percent');
                    const statusText = document.getElementById('upload-status-text');
                    
                    progressContainer.classList.remove('d-none');
                    progressBar.style.width = '0%';
                    progressPercent.textContent = '0%';
                    statusText.textContent = '正在上传剩余文件...';

                    // Use XMLHttpRequest for progress tracking
                    const uploadPromise = new Promise((resolve, reject) => {
                        const xhr = new XMLHttpRequest();
                        let hasRealProgress = false;
                        let stopFallbackProgress = startUploadFallbackProgress(progressBar, progressPercent, statusText);
                        
                        // Track upload progress
                        xhr.upload.onprogress = (event) => {
                            if (event.lengthComputable) {
                                hasRealProgress = true;
                                stopFallbackProgress();
                                const percent = Math.round((event.loaded / event.total) * 100);
                                progressBar.style.width = percent + '%';
                                progressPercent.textContent = percent + '%';
                                progressBar.setAttribute('aria-valuenow', percent);
                                
                                if (percent === 100) {
                                    statusText.textContent = '文件上传完成，正在处理...';
                                }
                            } else if (!hasRealProgress) {
                                statusText.textContent = '正在上传文件（无法计算进度）...';
                            }
                        };

                        xhr.upload.onload = () => {
                            stopFallbackProgress();
                            progressBar.style.width = '100%';
                            progressPercent.textContent = '100%';
                            statusText.textContent = '文件上传完成，正在处理...';
                        };

                        xhr.onload = () => {
                            stopFallbackProgress();
                            if (xhr.status >= 200 && xhr.status < 300) {
                                try {
                                    const response = JSON.parse(xhr.responseText);
                                    resolve(response);
                                } catch (e) {
                                    reject(new Error('解析服务器响应失败'));
                                }
                            } else {
                                reject(new Error(`上传失败: ${xhr.statusText || xhr.status}`));
                            }
                        };

                        xhr.onerror = () => {
                            stopFallbackProgress();
                            reject(new Error('网络连接错误，上传失败'));
                        };
                        xhr.ontimeout = () => {
                            stopFallbackProgress();
                            reject(new Error('上传超时，请稍后重试'));
                        };
                        
                        xhr.open('POST', `${API_PREFIX}/upload`);
                        xhr.send(formData);
                    });

                    const uploadResult = await uploadPromise;

                    progressBar.style.width = '100%';
                    progressPercent.textContent = '100%';
                    statusText.textContent = '文件上传完成，正在处理...';
                    progressBar.classList.add('progress-bar-striped', 'progress-bar-animated');

                    chatInput.disabled = true;
                    const submitBtn = document.getElementById('chat-submit-btn');
                    submitBtn.disabled = true;
                    chatInput.placeholder = '等待文件处理完成...';

                    await pollFileStatus(currentSessionId, filesToUpload.map(f => f.name));

                    chatInput.disabled = false;
                    submitBtn.disabled = false;
                    chatInput.placeholder = '在此输入您的查询...';
                    progressBar.classList.remove('progress-bar-striped', 'progress-bar-animated');

                    setTimeout(() => {
                        progressContainer.classList.add('d-none');
                        progressBar.style.width = '0%';
                    }, 1500);

                    clearFiles();
                    loadingElement.remove();

                    if (uploadResult.answer) {
                        addMessage('system', uploadResult.answer, uploadResult);
                    } else {
                        const uploadedNames = uploadResult.files.map(f => f.name).join(', ');
                        addMessage('system', `文件处理完成！\n已就绪文件：${uploadedNames}`, uploadResult);
                    }
                    
                } else {
                    // Send text-only query to server (all files already uploaded)
                    const retrievalInstruction = document.getElementById('retrieval-instruction').value;
                    const enableThinking = document.getElementById('thinking-toggle').checked;
                    const payload = { 
                        query: message, 
                        mode: currentQueryMode,
                        memory_mode: currentMemoryMode,
                        retrieval_instruction: retrievalInstruction,
                        enable_thinking: enableThinking
                    };
                    
                    // Add session ID if available
                    if (currentSessionId) {
                        payload.session_id = currentSessionId;
                    }
                    
                    const result = await fetchData(`${API_PREFIX}/query/text`, {
                        method: 'POST',
                        body: JSON.stringify(payload)
                    });
                    
                    // Remove loading indicator
                    loadingElement.remove();
                    
                    // Add system response
                    addMessage('system', result.answer, result);
                    
                    // Clear selected files
                    clearFiles();
                }
                
            } catch (error) {
                console.error('Error sending message:', error);
                
                // Hide progress bar on error
                document.getElementById('upload-progress-container').classList.add('d-none');
                
                // Remove loading indicator
                loadingElement.remove();
                
                // Add error message
                addMessage('system', `抱歉，执行操作时发生错误：${error.message}`, null, true);
                
                // Clear selected files on error
                clearFiles();
            } finally {
                isLoading = false;
            }
        }

        async function ingestStream() {
            const message = chatInput.value.trim();
            if (!message || isLoading) return;
            if (selectedFiles.length > 0) {
                showAlert('请先上传文件或清空已选择文件，再进行信息流沉淀。', 'warning');
                return;
            }

            isLoading = true;
            chatInput.value = '';
            chatInput.style.height = 'auto';

            addMessage('user', `💡 沉淀：${message}`);
            const loadingElement = addLoadingIndicator();

            try {
                const payload = {
                    content: message,
                    source_type: 'note'
                };
                if (currentSessionId) {
                    payload.session_id = currentSessionId;
                }

                const result = await fetchData(`${API_PREFIX}/ingest/stream`, {
                    method: 'POST',
                    body: JSON.stringify(payload)
                });

                loadingElement.remove();
                addMessage('system', result.message || '已进入认知处理队列', result);
            } catch (error) {
                loadingElement.remove();
                addMessage('system', `沉淀失败：${error.message}`, null, true);
            } finally {
                isLoading = false;
            }
        }

        // Add message to chat
        function addMessage(role, content, data = null, isError = false) {
            const chatMessages = document.getElementById('chat-messages');
            
            // Create message element
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${role}`;
            
            // Create message bubble
            const bubbleDiv = document.createElement('div');
            bubbleDiv.className = 'message-bubble';
            
            // Message content
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';

            if (role === 'system' && data && data.answer_mode === 'fast_qa') {
                const badge = document.createElement('div');
                badge.className = 'mb-2';
                badge.innerHTML = '<span class="badge bg-success">快问答</span>';
                bubbleDiv.appendChild(badge);
            }

            if (role === 'system' && data && data.thinking_process) {
                const details = document.createElement('details');
                details.className = 'mb-2';
                details.innerHTML = `
                    <summary class="text-secondary" style="cursor: pointer; font-size: 0.85rem;">
                        <i class="fa fa-brain me-1"></i> 深度思考
                    </summary>
                `;
                const processText = document.createElement('div');
                processText.className = 'mt-2 p-2 bg-light rounded text-dark';
                processText.style.fontSize = '0.9rem';
                processText.style.whiteSpace = 'pre-wrap';
                processText.textContent = data.thinking_process;
                details.appendChild(processText);
                bubbleDiv.appendChild(details);
            }

            const safeContent = (content || '抱歉，收到空回复。').toString();
            contentDiv.innerHTML = safeContent.replace(/\n/g, '<br>');
            bubbleDiv.appendChild(contentDiv);
            
            // Add confidence and sources if available
            if (role === 'system' && data && !isError && (data.sources && data.sources.length > 0)) {
                const chatResults = document.createElement('div');
                chatResults.className = 'chat-results';
                
                // Confidence score
                const confidence = data.confidence || 0.85;
                const confidencePercent = Math.round(confidence * 100);
                chatResults.innerHTML += `
                    <div class="result-confidence">
                        <i class="fa fa-check-circle"></i> 置信度：${confidence.toFixed(2)} (${confidencePercent}%)
                    </div>
                `;
                
                // Sources
                if (data.sources && data.sources.length > 0) {
                    chatResults.innerHTML += `
                        <div class="result-sources">
                            <strong>来源 (${data.sources.length})：</strong>
                            ${data.sources.map((source, index) => `
                                <div class="result-source">
                                    <div class="result-source-title">来源 ${index + 1} (${source.confidence.toFixed(2)})</div>
                                    <div class="result-source-content">${source.content}</div>
                                </div>
                            `).join('')}
                        </div>
                    `;
                }
                
                bubbleDiv.appendChild(chatResults);
            }
            
            // Message info (timestamp)
            const infoDiv = document.createElement('div');
            infoDiv.className = 'message-info';
            infoDiv.innerHTML = `<small>${role === 'user' ? '我' : 'whitecat'} • 刚刚</small>`;
            bubbleDiv.appendChild(infoDiv);
            
            // Message actions
            const actionsDiv = document.createElement('div');
            actionsDiv.className = 'message-actions';
            actionsDiv.innerHTML = `
                <button class="message-action-btn" onclick="copyMessage(this)" title="复制">
                    <i class="fa fa-copy"></i>
                </button>
            `;
            bubbleDiv.appendChild(actionsDiv);
            
            // Add bubble to message
            messageDiv.appendChild(bubbleDiv);
            
            // Add message to chat
            chatMessages.appendChild(messageDiv);
            
            // Scroll to bottom
            chatMessages.scrollTop = chatMessages.scrollHeight;
            
            // Save to chat history
            chatHistory.push({
                role: role,
                content: content,
                timestamp: new Date().toISOString(),
                data: data
            });
        }

        // Add loading indicator
        function addLoadingIndicator() {
            const chatMessages = document.getElementById('chat-messages');
            
            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'message system';
            loadingDiv.innerHTML = `
                <div class="message-bubble">
                    <div class="loading-indicator">
                        <div class="typing-dots">
                            <div class="typing-dot"></div>
                            <div class="typing-dot"></div>
                            <div class="typing-dot"></div>
                        </div>
                        <span>正在思考...</span>
                    </div>
                </div>
            `;
            
            chatMessages.appendChild(loadingDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            
            return loadingDiv;
        }

        // Copy message to clipboard
        function copyMessage(button) {
            const messageBubble = button.closest('.message-bubble');
            const contentDiv = messageBubble.querySelector('.message-content');
            let text = '';
            
            if (contentDiv) {
                text = contentDiv.innerText;
            } else {
                // Fallback for welcome message
                const paragraphs = messageBubble.querySelectorAll('p');
                if (paragraphs.length > 0) {
                    text = Array.from(paragraphs).map(p => p.textContent).join('\n');
                }
            }
            
            navigator.clipboard.writeText(text).then(() => {
                // Show success feedback
                const originalIcon = button.innerHTML;
                button.innerHTML = '<i class="fa fa-check"></i>';
                button.style.color = '#28a745';
                
                setTimeout(() => {
                    button.innerHTML = originalIcon;
                    button.style.color = '';
                }, 1000);
            }).catch(err => {
                console.error('Failed to copy text:', err);
            });
        }

        // Clear chat
        function clearChat() {
            if (confirm('确定要清空聊天记录吗？')) {
                const chatMessages = document.getElementById('chat-messages');
                chatMessages.innerHTML = `
                    <div class="message system">
                        <div class="message-bubble">
                            <p>你好！我是 whitecat 智能助手，很高兴为您服务。</p>
                            <p>请输入您的查询，我将尽力为您提供准确的回答。</p>
                            <div class="message-info">
                                <small>whitecat • 刚刚</small>
                            </div>
                        </div>
                    </div>
                `;
                chatHistory = [];
            }
        }

        // Toggle history (placeholder for future implementation)
        function toggleHistory() {
            showAlert('历史记录功能将在后续版本中实现。', 'info');
        }
    </script>
